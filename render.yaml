services:
  - type: worker
    name: drewaifu
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    autoDeploy: true
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: TELEGRAM_CHANNEL_ID
        sync: false
      - key: OWNER_ID
        sync: false
      - key: BOT_NAME
        sync: false
